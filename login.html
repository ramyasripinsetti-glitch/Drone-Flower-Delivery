<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Drone Flower Delivery</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">

        <!-- Left Side -->
        <div class="login-left">

            <h1>🌸 Drone Flower Delivery</h1>

            <h2>Welcome Back!</h2>

            <p>
                Login to continue and surprise your loved ones with
                beautiful flowers delivered by our autonomous drone.
            </p>

            <img src="images/drone.png" alt="Drone Delivery">

        </div>

        <!-- Right Side -->
        <div class="login-right">

            <form class="login-form">

                <h2>Login</h2>

                <p>Please login to your account</p>

                <!-- Email -->
                <div class="input-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        placeholder="Enter your email"
                        required>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label>Password</label>
                    <input
                        type="password"
                        placeholder="Enter your password"
                        required>
                </div>

                <!-- Remember Me -->
                <div class="options">

                    <label>
                        <input type="checkbox">
                        Remember Me
                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <!-- Login Button -->
                <button type="submit">
                    Login
                </button>

                <!-- Divider -->
                <div class="divider">
                    <span>OR</span>
                </div>

            

                <!-- Sign Up -->
                <p class="signup-link">
                    Don't have an account?
                    <a href="register.html">Create Account</a>
                </p>

            </form>

        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
