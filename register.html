<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Drone Flower Delivery</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="register-container">

        <!-- Left Section -->
        <div class="register-left">

            <h1>🌸 Drone Flower Delivery</h1>

            <h2>Create Your Account</h2>

            <p>
                Join us today and experience the future of flower delivery
                with autonomous drone technology.
            </p>

            <img src="images/flowers.jpeg" alt="Drone Flower Delivery">

        </div>

        <!-- Right Section -->
        <div class="register-right">

            <form class="register-form">

                <h2>Sign Up</h2>

                <p>Create your new account</p>

                <!-- Full Name -->
                <div class="input-group">
                    <label>Full Name</label>
                    <input
                        type="text"
                        placeholder="Enter your full name"
                        required>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        placeholder="Enter your email"
                        required>
                </div>

                <!-- Phone -->
                <div class="input-group">
                    <label>Phone Number</label>
                    <input
                        type="tel"
                        placeholder="Enter your phone number"
                        required>
                </div>

                <!-- Address -->
                <div class="input-group">
                    <label>Address</label>
                    <textarea
                        rows="3"
                        placeholder="Enter your address"
                        required></textarea>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label>Password</label>
                    <input
                        type="password"
                        placeholder="Create a password"
                        required>
                </div>

                <!-- Confirm Password -->
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input
                        type="password"
                        placeholder="Confirm your password"
                        required>
                </div>

                <!-- Terms -->
                <div class="terms">
                    <label>
                        <input type="checkbox" required>
                        I agree to the Terms & Conditions and Privacy Policy.
                    </label>
                </div>

                <!-- Register Button -->
                <button type="submit">
                    Create Account
                </button>

                <!-- Divider -->
                <div class="divider">
                    <span>OR</span>
                </div>

            

                <!-- Login Link -->
                <p class="login-link">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

            </form>

        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
